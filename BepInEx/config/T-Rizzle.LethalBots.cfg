## Settings file was created by plugin LethalBots v4.0.0
## Plugin GUID: T-Rizzle.LethalBots

[1. General Settings]

## Be aware of possible performance problems when more than ~16 bots spawned
# Setting type: Int32
# Default value: 16
# Acceptable value range: From 0 to 50
Max amount of bots that can spawn = 3

## Although bots call the base game name billboard display code, you can manually disable their name tags here.
# Setting type: Boolean
# Default value: false
Should bots have their name tags disabled (Client only) = false

[2. Bot identities]

## Spawn the bot with random identities from the file rather than in order?
# Setting type: Boolean
# Default value: false
Randomness of identities = true

## Should the LethalBotManager reset all identities after the game over fired screen? (NOTE: This will make bots lose all progress and levels in that identity!)
# Setting type: Boolean
# Default value: false
Reset identities when fired = false

## Should the SaveManager reset all identities next time you start a save file? (NOTE: This will automatically set itself to false when after it deletes the bot's save file. This will make bots lose all progress and levels in all identities!)
# Setting type: Boolean
# Default value: false
Reset identities (Host only) = false

[3. Behavior]

## Should the bot crouch like the player is crouching? (NOTE: This will not affect the dynamic crouching AI!)
# Setting type: Boolean
# Default value: true
Crouch with player = true

## Should the bot automatically switch to the same suit as the player who they are assigned to?
# Setting type: Boolean
# Default value: false
Options for automaticaly switch suit = true

## Should the bot be allowed to use the chat? (NOTE: This is useful if you don't want bots spamming the chat! Also this doesn't affect bots calling out jesters!)
# Setting type: Boolean
# Default value: true
Allow using chat = true

## Should the bot who is the active mission controller be allowed to teleport living players. (NOTE: This doesn't affect dead body teleportation or if a player specifically request to be teleported!)
# Setting type: Boolean
# Default value: true
Allow the mission controller to teleport living players = true

## Should non-host players be allowed to tell the mission controller bot to start the ship? (NOTE: Bots will allow non-host players to start the ship if the host is dead regardless of this option!)
# Setting type: Boolean
# Default value: true
Start the ship chat command protection = true

## Should bots that are chilling at the ship automatically assume the mission control state if the current mission controller is not set or dead?
# Setting type: Boolean
# Default value: true
Allow automatic mission control assignment = true

## How much money should the bot leave in reserve when restocking the ship. This is useful if you want the bot to keep some spare cash on hand.
# Setting type: Int32
# Default value: 0
# Acceptable value range: From 0 to 2147483647
Bot restock spending limit = 0

## At what time should bots automatically return to the ship. This has to be a normalized value. TIP: 10:00 PM is about 0.9f and the time the ship auto leaves at is 0.996f!
# Setting type: Single
# Default value: 0.63
# Acceptable value range: From 0 to 1
Return to ship time = 0.63

## Should the bot just teleport and bypass any animations when using ladders? (Useful if you think the bot tends to get stuck on them!)
# Setting type: Boolean
# Default value: false
Teleport when using ladders = false

## Should the bot sell all scrap on the ship? If false, bots will use advanced AI to only sell to quota! (NOTE: This is useful if you have a mod such as quota rollover and the like!)
# Setting type: Boolean
# Default value: false
Sell all scrap on ship = false

## Should the bot drop all equipment its holding when at the ship? If false, bots will hold onto equipment, such as shovels! (NOTE: This doesn't affect bot loadouts or if it returns to the ship on its own!)
# Setting type: Boolean
# Default value: false
Drop held equipment at ship = false

## Should bots attempt to kill every enemy in the game, even if they can't be killed normally?
# Setting type: Boolean
# Default value: false
Should bots attempt to kill everything = false

## Should the bot grab the items near main entrance and fire exits?
# Setting type: Boolean
# Default value: true
Grab items near entrances = true

## Should the bot try to grab bees nests? (NOTE: Bots will sell them regardless if this is true or false!)
# Setting type: Boolean
# Default value: false
Grab bees nests = false

## Should the bot try to grab dead bodies? (NOTE: The bot at the terminal will still teleport them back to the ship!))
# Setting type: Boolean
# Default value: true
Grab dead bodies = true

## Is the bot allowed to grab docked apparatuses?
# Setting type: Boolean
# Default value: true
Grab docked apparatus = true

## Is the bot allowed to calm down the baby maneater if its crying?
# Setting type: Boolean
# Default value: true
Take care of baby maneater = true

## Should the bot use advanced AI for taking care of the baby maneater? (WARNING: This is experimental and may cause issues!)
# Setting type: Boolean
# Default value: false
Advanced baby maneater AI = true

## Should the bot try to grab the wheelbarrow (mod)?
# Setting type: Boolean
# Default value: false
Grab the wheelbarrow = false

## Should the bot try to grab the shopping cart (mod)?
# Setting type: Boolean
# Default value: false
Grab the shopping cart = false

